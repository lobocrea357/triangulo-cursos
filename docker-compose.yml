services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: triangulo-academy-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Aquí puedes sobrescribir variables de entorno en el servidor si lo necesitas
      # - NEXT_PUBLIC_SUPABASE_URL=https://db.trianguloacademy.com
